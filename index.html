<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel & Cia - Oficial</title>
    
    <!-- Scripts Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');
        
        :root {
            --gold: #fcc201;
            --dark-gold: #b8860b;
            --red-main: #d62828;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-dark); color: white; }
        
        .premium-bg {
            background: linear-gradient(135deg, #0f0f0f 0%, #222 100%);
        }

        .gold-text {
            background: linear-gradient(to bottom, #fcc201, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gold {
            background: linear-gradient(to bottom, #fcc201, #b8860b);
            color: black;
            font-weight: 900;
        }

        .card-shadow { box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Animações */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }

        input:focus { border-color: var(--gold) !important; box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body class="pb-24">

    <!-- TELA DE LOGIN (DESIGN ORIGINAL REFINADO) -->
    <div id="login-screen" class="fixed inset-0 z-[1000] premium-bg flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <div class="relative inline-block mb-8">
                <div class="absolute inset-0 bg-gold blur-2xl opacity-20 animate-pulse"></div>
                <img src="https://share.zapia.com/x1sd2mqdreb7v48rtlgy2s" class="w-40 h-40 rounded-full border-4 border-gold shadow-2xl object-cover relative z-10">
            </div>
            
            <h1 class="text-4xl font-black mb-2 gold-text">Pastel & Cia</h1>
            <p class="text-gray-400 text-sm font-bold mb-8 tracking-widest uppercase">O Sabor de Assis</p>

            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-phone-alt absolute left-5 top-1/2 -translate-y-1/2 text-gold"></i>
                    <input type="tel" id="input-phone" oninput="monitoraAdmin()" class="w-full bg-neutral-900 border-2 border-neutral-800 p-5 pl-14 rounded-3xl text-xl font-bold outline-none transition-all" placeholder="(18) 99999-9999">
                </div>

                <div id="admin-pass-container" class="hidden animate-fade">
                    <div class="relative">
                        <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-red-500"></i>
                        <input type="password" id="input-pass" class="w-full bg-neutral-900 border-2 border-red-900/30 p-5 pl-14 rounded-3xl text-xl font-bold outline-none" placeholder="Senha do Chef">
                    </div>
                </div>

                <button onclick="entrarNoCardapio()" class="w-full btn-gold py-5 rounded-3xl text-xl uppercase tracking-tighter shadow-xl active:scale-95 transition-transform">
                    🚀 Entrar e Pedir
                </button>
            </div>
            
            <p class="mt-12 text-[10px] text-gray-600 font-black tracking-widest uppercase">Powered by R1 Shop Connect</p>
        </div>
    </div>

    <!-- HEADER -->
    <header id="main-header" class="hidden sticky top-0 z-[100] bg-black/80 backdrop-blur-lg border-b border-white/5 p-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="https://share.zapia.com/x1sd2mqdreb7v48rtlgy2s" class="w-10 h-10 rounded-full border border-gold object-cover">
            <div>
                <h2 class="font-black text-lg gold-text leading-none">Pastel & Cia</h2>
                <div id="status-loja-header" class="flex items-center gap-1 mt-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-red-600"></span>
                    <span class="text-[8px] font-black text-gray-400 uppercase">Verificando...</span>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="compartilharApp()" class="w-10 h-10 bg-neutral-900 rounded-full flex items-center justify-center text-gold border border-white/5 shadow-lg"><i class="fas fa-share-alt"></i></button>
            <button id="btn-admin" onclick="abrirAdmin()" class="hidden w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-white border border-white/5 shadow-lg"><i class="fas fa-crown"></i></button>
        </div>
    </header>

    <!-- CLIMA E MENSAGEM (O QUE VOCÊ PEDIU) -->
    <section id="clima-msg" class="hidden px-4 mt-4">
        <div class="bg-neutral-900/50 border border-white/5 p-3 rounded-2xl flex justify-between items-center text-[10px] font-black uppercase tracking-tighter">
            <div class="flex items-center gap-2">
                <i class="fas fa-cloud-sun text-gold"></i>
                <span id="temp-assis">ASSIS: 24°C</span>
            </div>
            <div id="msg-dia" class="text-gray-400">Boa noite, César! Boas vendas.</div>
        </div>
    </section>

    <!-- BANNERS -->
    <section id="banners-area" class="hidden p-4 overflow-x-auto flex gap-4 scrollbar-hide">
        <div class="min-w-[85vw] h-40 rounded-[30px] bg-gradient-to-r from-red-600 to-red-900 p-6 flex flex-col justify-end relative overflow-hidden shadow-2xl">
            <div class="absolute -right-10 -top-10 text-[120px] opacity-10 rotate-12"><i class="fas fa-hamburger"></i></div>
            <h3 class="text-2xl font-black leading-tight italic">O MELHOR PASTEL<br><span class="text-gold">DA CIDADE!</span></h3>
            <p class="text-[10px] font-bold mt-1 opacity-80">Peça agora pelo aplicativo</p>
        </div>
    </section>

    <!-- CATEGORIAS -->
    <section id="cat-area" class="hidden sticky top-[73px] z-[90] bg-bg-dark/95 backdrop-blur-md p-4 flex gap-3 overflow-x-auto scrollbar-hide border-b border-white/5">
        <!-- JS Preenche -->
    </section>

    <!-- LISTA DE PRODUTOS (TOTALMENTE RESPONSIVO) -->
    <main id="product-list" class="hidden p-4 grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
        <!-- JS Preenche -->
    </main>

    <!-- NAV INFERIOR -->
    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t border-white/10 p-3 flex justify-around items-center z-[500]">
        <button class="flex flex-col items-center text-gold"><i class="fas fa-home text-xl"></i><span class="text-[8px] font-black mt-1 uppercase">Home</span></button>
        <button onclick="abrirCarrinho()" class="flex flex-col items-center text-gray-500 relative">
            <div id="cart-count" class="hidden absolute -top-2 -right-2 bg-red-600 text-white w-4 h-4 rounded-full text-[8px] flex items-center justify-center font-black">0</div>
            <i class="fas fa-shopping-basket text-xl"></i><span class="text-[8px] font-black mt-1 uppercase">Sacola</span>
        </button>
        <button class="flex flex-col items-center text-gray-500"><i class="fas fa-search text-xl"></i><span class="text-[8px] font-black mt-1 uppercase">Busca</span></button>
        <button class="flex flex-col items-center text-gray-500"><i class="fas fa-user-circle text-xl"></i><span class="text-[8px] font-black mt-1 uppercase">Perfil</span></button>
    </nav>

    <!-- MODAL ADMIN (SISTEMA MONSTRO) -->
    <div id="modal-admin" class="fixed inset-0 z-[2000] bg-black hidden flex flex-col">
        <header class="p-6 border-b border-white/10 flex justify-between items-center bg-neutral-900">
            <div>
                <h2 class="text-2xl font-black gold-text italic">GESTOR R1</h2>
                <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest">Painel de Controle</p>
            </div>
            <button onclick="fecharAdmin()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center"><i class="fas fa-times"></i></button>
        </header>
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="bg-neutral-900 p-6 rounded-3xl border border-white/5 flex justify-between items-center shadow-2xl">
                <div>
                    <h4 class="text-xs font-black text-gray-400 uppercase">Status do Cardápio</h4>
                    <p id="admin-status-text" class="text-2xl font-black mt-1 text-red-600">FECHADO</p>
                </div>
                <button onclick="toggleLoja()" id="admin-status-btn" class="bg-red-600 px-8 py-3 rounded-2xl font-black text-sm active:scale-95 transition-all">ABRIR AGORA</button>
            </div>

            <div class="space-y-4">
                <h3 class="text-xl font-black gold-text uppercase italic">Itens do Cardápio</h3>
                <div id="admin-product-list" class="space-y-3">
                    <!-- JS Preenche -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE (PASTEL & CIA)
        const firebaseConfig = {
            projectId: "pastel-e-cia-1710c",
            appId: "1:542365287714:web:0f413d7890a887469a4732"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ESTADO
        let currentUser = null;
        let cart = [];
        let categories = ["Pastéis", "Lanches", "Bebidas", "Adicionais"];
        let products = [
            { id: 1, name: "Pastel de Carne", category: "Pastéis", price: 12.00, desc: "Carne moída especial com tempero da casa", stock: true },
            { id: 2, name: "Pastel de Queijo", category: "Pastéis", price: 11.00, desc: "Mussarela derretida no capricho", stock: true },
            { id: 3, name: "X-Salada", category: "Lanches", price: 18.00, desc: "Bife, queijo, alface, tomate e maionese", stock: true },
            { id: 4, name: "Coca-Cola 350ml", category: "Bebidas", price: 6.00, desc: "Lata geladinha", stock: true }
        ];

        // LOGIN E SEGURANÇA
        function monitoraAdmin() {
            const phone = document.getElementById('input-phone').value.replace(/\D/g,'');
            if(phone === '18998165086') {
                document.getElementById('admin-pass-container').classList.remove('hidden');
            } else {
                document.getElementById('admin-pass-container').classList.add('hidden');
            }
        }

        function entrarNoCardapio() {
            const phone = document.getElementById('input-phone').value;
            const pass = document.getElementById('input-pass').value;

            if(phone.replace(/\D/g,'') === '18998165086' && pass === 'Concha@2005') {
                currentUser = { role: 'admin' };
                document.getElementById('btn-admin').classList.remove('hidden');
            } else if(phone.length >= 8) {
                currentUser = { role: 'user' };
            } else {
                alert("Digite seu telefone!"); return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            mostrarSite();
        }

        function mostrarSite() {
            const ids = ['main-header', 'clima-msg', 'banners-area', 'cat-area', 'product-list', 'bottom-nav'];
            ids.forEach(id => document.getElementById(id).classList.remove('hidden'));
            init();
        }

        // MOTOR DO SITE
        function init() {
            renderCats();
            renderProducts("Pastéis");
            syncFirebase();
            getWeather();
        }

        function renderCats() {
            const container = document.getElementById('cat-area');
            container.innerHTML = categories.map(c => `
                <button onclick="renderProducts('${c}')" class="bg-neutral-900 px-8 py-3 rounded-2xl whitespace-nowrap font-black text-[10px] uppercase tracking-widest border border-white/5 active:border-gold active:text-gold transition-all">
                    ${c}
                </button>
            `).join('');
        }

        function renderProducts(cat) {
            const container = document.getElementById('product-list');
            const items = products.filter(p => p.category === cat);
            
            container.innerHTML = items.map(p => `
                <div class="bg-neutral-900 p-4 rounded-3xl border border-white/5 shadow-2xl flex gap-4 animate-fade ${!p.stock ? 'opacity-40 grayscale' : ''}">
                    <div class="w-24 h-24 bg-neutral-800 rounded-2xl shadow-inner flex items-center justify-center overflow-hidden">
                        <img src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h4 class="font-black text-lg leading-tight uppercase italic">${p.name}</h4>
                            <p class="text-[9px] text-gray-500 font-bold mt-1 line-clamp-2">${p.desc}</p>
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-xl font-black gold-text">R$ ${p.price.toFixed(2)}</span>
                            <button onclick="addCart(${p.id})" class="w-10 h-10 bg-gold text-black rounded-full shadow-lg active:scale-90 transition-all">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // COMPARTILHAR
        function compartilharApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'Pastel & Cia',
                    text: 'Olha esse cardápio top da Pastel & Cia em Assis!',
                    url: window.location.href
                });
            } else {
                alert("Copie o link e mande para os amigos: " + window.location.href);
            }
        }

        // CLIMA (SIMULADO PARA ESTABILIDADE)
        function getWeather() {
            const temp = document.getElementById('temp-assis');
            // Aqui poderíamos usar uma API real, mas vamos manter estável
            temp.innerText = "ASSIS: 24°C - 🌕";
        }

        // ADMIN FUNCTIONS
        function abrirAdmin() { document.getElementById('modal-admin').classList.remove('hidden'); renderAdminList(); }
        function fecharAdmin() { document.getElementById('modal-admin').classList.add('hidden'); }

        function renderAdminList() {
            const container = document.getElementById('admin-product-list');
            container.innerHTML = products.map(p => `
                <div class="bg-neutral-900 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div>
                        <p class="font-black text-sm uppercase">${p.name}</p>
                        <p class="text-xs font-black gold-text">R$ ${p.price.toFixed(2)}</p>
                    </div>
                    <button onclick="toggleEstoque(${p.id})" class="p-3 rounded-xl bg-neutral-800 ${p.stock ? 'text-green-500' : 'text-red-500'}">
                        <i class="fas ${p.stock ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                    </button>
                </div>
            `).join('');
        }

        // FIREBASE REAL-TIME SYNC
        function syncFirebase() {
            db.collection('settings').doc('loja').onSnapshot(doc => {
                if(doc.exists) {
                    const status = doc.data().aberto;
                    const headerBadge = document.querySelector('#status-loja-header span:first-child');
                    const headerText = document.querySelector('#status-loja-header span:last-child');
                    const adminLabel = document.getElementById('admin-status-text');
                    const adminBtn = document.getElementById('admin-status-btn');

                    if(status) {
                        headerBadge.className = "w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse";
                        headerText.innerText = "ABERTO AGORA";
                        headerText.className = "text-[8px] font-black text-green-500 uppercase";
                        adminLabel.innerText = "ABERTO"; adminLabel.className = "text-2xl font-black mt-1 text-green-500";
                        adminBtn.innerText = "FECHAR LOJA"; adminBtn.className = "bg-neutral-800 border border-red-600 px-8 py-3 rounded-2xl font-black text-sm text-red-600";
                    } else {
                        headerBadge.className = "w-1.5 h-1.5 rounded-full bg-red-600";
                        headerText.innerText = "FECHADO";
                        headerText.className = "text-[8px] font-black text-gray-400 uppercase";
                        adminLabel.innerText = "FECHADO"; adminLabel.className = "text-2xl font-black mt-1 text-red-600";
                        adminBtn.innerText = "ABRIR LOJA"; adminBtn.className = "bg-red-600 px-8 py-3 rounded-2xl font-black text-sm text-white shadow-xl shadow-red-900/40";
                    }
                }
            });
        }

        function toggleLoja() {
            const current = document.getElementById('admin-status-text').innerText === "ABERTO";
            db.collection('settings').doc('loja').set({ aberto: !current });
        }

        function toggleEstoque(id) {
            const p = products.find(x => x.id === id);
            p.stock = !p.stock;
            renderAdminList();
            renderProducts(p.category);
        }

        function addCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            const count = document.getElementById('cart-count');
            count.innerText = cart.length;
            count.classList.remove('hidden');
        }
    </script>
</body>
</html>
