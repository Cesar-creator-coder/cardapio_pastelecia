<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel & Cia - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
        .bg-gold { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); }
        .bg-dark { background: #121212; }
        .card-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .active-tab { color: #facc15; border-bottom: 3px solid #facc15; }
        .btn-red { background: linear-gradient(180deg, #e11d48, #9f1239); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24">

    <!-- OVERLAY DE LOGIN (O MOTOR DO SISTEMA) -->
    <div id="login-overlay" class="fixed inset-0 z-[1000] flex items-center justify-center bg-dark p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 text-center shadow-2xl overflow-hidden relative">
            <div class="absolute top-0 left-0 w-full h-2 bg-gold"></div>
            <img src="https://share.zapia.com/x1sd2mqdreb7v48rtlgy2s" class="w-32 h-32 mx-auto rounded-full border-4 border-gray-100 shadow-xl mb-6 object-cover">
            <h1 class="text-4xl font-black text-red-600 mb-2">Pastel & Cia</h1>
            <p class="text-gray-400 font-bold mb-8">Bem-vindo! Digite seu WhatsApp para acessar.</p>
            
            <div class="space-y-4">
                <input type="tel" id="login-phone" oninput="toggleAdminPass()" class="w-full bg-gray-100 border-2 border-transparent focus:border-orange-400 outline-none p-5 rounded-3xl text-center font-black text-2xl tracking-widest" placeholder="(18) 00000-0000">
                
                <div id="admin-pass-box" class="hidden animate-bounce">
                    <p class="text-xs text-red-500 font-black mb-1">CHAVE ADMINISTRATIVA</p>
                    <input type="password" id="login-pass" class="w-full bg-red-50 border-2 border-red-200 outline-none p-5 rounded-3xl text-center font-black text-2xl" placeholder="••••••">
                </div>

                <button onclick="validaLogin()" class="w-full btn-red text-white font-black py-5 rounded-[25px] shadow-xl text-xl uppercase tracking-wider transform transition hover:scale-105 active:scale-95">
                    🚀 Abrir Cardápio
                </button>
            </div>
            <p class="mt-8 text-[10px] text-gray-300 uppercase font-black">Sistema R1 Shop Connect © 2026</p>
        </div>
    </div>

    <!-- CABEÇALHO -->
    <header id="app-header" class="hidden sticky top-0 z-[100] bg-dark text-white p-4 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
            <img src="https://share.zapia.com/x1sd2mqdreb7v48rtlgy2s" class="w-12 h-12 rounded-full border-2 border-orange-400 shadow-lg object-cover">
            <div>
                <h2 class="font-black text-xl leading-none">Pastel & Cia</h2>
                <div class="flex items-center gap-1 mt-1">
                    <span id="status-badge" class="w-2 h-2 rounded-full bg-red-600"></span>
                    <span id="status-text" class="text-[9px] font-black uppercase text-gray-400 tracking-tighter">FECHADO</span>
                </div>
            </div>
        </div>
        <button id="btn-admin-access" onclick="openAdmin()" class="hidden bg-gray-800 px-4 py-2 rounded-full text-[10px] font-black text-orange-400 border border-gray-700">
            <i class="fas fa-crown mr-1"></i> PAINEL ADMIN
        </button>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main id="app-content" class="hidden">
        <!-- BANNERS -->
        <div id="banner-slider" class="p-4 flex gap-4 overflow-x-auto scrollbar-hide">
            <div class="min-w-full h-44 bg-gold rounded-[35px] flex flex-col justify-center p-8 text-white relative overflow-hidden shadow-lg">
                <h3 class="text-3xl font-black leading-tight z-10">BEM-VINDO!<br><span class="text-red-700">Pastel & Cia</span></h3>
                <p class="text-sm font-bold mt-2 z-10">O melhor de Assis e região 🥟</p>
                <div class="absolute -right-10 -bottom-10 opacity-20 text-[150px]"><i class="fas fa-hamburger"></i></div>
            </div>
        </div>

        <!-- CATEGORIAS -->
        <div id="category-bar" class="sticky top-[80px] bg-gray-50 z-50 p-4 flex gap-3 overflow-x-auto scrollbar-hide">
            <!-- Gerado via JS -->
        </div>

        <!-- LISTA DE PRODUTOS -->
        <div id="product-container" class="px-4 space-y-4">
            <!-- Gerado via JS -->
        </div>
    </main>

    <!-- NAVEGAÇÃO INFERIOR -->
    <nav id="app-nav" class="hidden fixed bottom-0 left-0 right-0 glass border-t border-gray-200 flex justify-around items-center p-3 z-[500] shadow-inner">
        <button onclick="renderSection('home')" class="nav-btn active-tab flex flex-col items-center">
            <i class="fas fa-utensils text-xl"></i>
            <span class="text-[9px] font-black uppercase mt-1 tracking-widest">Cardápio</span>
        </button>
        <button onclick="renderSection('search')" class="nav-btn text-gray-400 flex flex-col items-center">
            <i class="fas fa-search text-xl"></i>
            <span class="text-[9px] font-black uppercase mt-1 tracking-widest">Buscar</span>
        </button>
        <button onclick="renderSection('cart')" class="nav-btn text-gray-400 flex flex-col items-center relative">
            <div id="cart-dot" class="hidden absolute top-0 right-1 w-4 h-4 bg-red-600 text-white text-[8px] flex items-center justify-center rounded-full font-black">0</div>
            <i class="fas fa-shopping-bag text-xl"></i>
            <span class="text-[9px] font-black uppercase mt-1 tracking-widest">Carrinho</span>
        </button>
        <button onclick="renderSection('orders')" class="nav-btn text-gray-400 flex flex-col items-center">
            <i class="fas fa-receipt text-xl"></i>
            <span class="text-[9px] font-black uppercase mt-1 tracking-widest">Pedidos</span>
        </button>
    </nav>

    <!-- PAINEL ADMIN (O SISTEMA QUE ELE QUER) -->
    <div id="admin-modal" class="fixed inset-0 bg-white z-[2000] hidden flex flex-col">
        <header class="bg-dark text-white p-6 flex justify-between items-center shadow-xl">
            <div>
                <h2 class="text-orange-400 font-black text-2xl leading-none">GESTOR R1</h2>
                <p class="text-[9px] text-gray-500 font-black mt-1">PAINEL DE CONTROLE PASTEL & CIA</p>
            </div>
            <button onclick="closeAdmin()" class="bg-gray-800 w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-times"></i></button>
        </header>
        <div class="flex-1 overflow-y-auto p-6 space-y-8 bg-gray-50">
            <!-- STATUS DA LOJA -->
            <div class="bg-white p-6 rounded-[30px] card-shadow flex justify-between items-center border-l-8 border-orange-400">
                <div>
                    <h4 class="font-black text-gray-400 text-xs uppercase tracking-widest">Estado Atual</h4>
                    <p id="admin-status-label" class="font-black text-2xl text-red-600">FECHADO</p>
                </div>
                <button id="admin-toggle-status" onclick="toggleStoreStatus()" class="btn-red px-8 py-3 rounded-full text-white font-black text-sm shadow-lg">ALTERAR</button>
            </div>

            <!-- GESTÃO DE PRODUTOS -->
            <div class="space-y-4">
                <h3 class="font-black text-xl text-dark border-b-4 border-gold inline-block pb-1">CARDÁPIO COMPLETO</h3>
                <div id="admin-items-list" class="space-y-3">
                    <!-- Gerado via JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE (PASTEL & CIA - OFICIAL)
        const firebaseConfig = {
            projectId: "pastel-e-cia-1710c",
            appId: "1:542365287714:web:0f413d7890a887469a4732"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ESTADO GLOBAL
        let currentUser = null;
        let categories = ["Pastéis", "Pastéis Doces", "Lanches", "Bebidas", "Adicionais"];
        let products = [
            // CATEGORIA: PASTÉIS
            { id: 1, name: "Carne", category: "Pastéis", price: 10.00, desc: "Carne moída especial e tempero da casa", img: "https://via.placeholder.com/150", stock: true },
            { id: 2, name: "Queijo", category: "Pastéis", price: 10.00, desc: "Mussarela premium derretida", img: "https://via.placeholder.com/150", stock: true },
            { id: 3, name: "Carne com Queijo", category: "Pastéis", price: 12.00, desc: "O clássico irresistível", img: "https://via.placeholder.com/150", stock: true },
            { id: 4, name: "Pizza", category: "Pastéis", price: 12.00, desc: "Presunto, queijo e orégano", img: "https://via.placeholder.com/150", stock: true },
            { id: 5, name: "Frango com Catupiry", category: "Pastéis", price: 13.00, desc: "Frango desfiado com Catupiry original", img: "https://via.placeholder.com/150", stock: true },
            // CATEGORIA: LANCHES
            { id: 10, name: "X-Burguer", category: "Lanches", price: 16.00, desc: "Pão, bife de hambúrguer e queijo", img: "https://via.placeholder.com/150", stock: true },
            { id: 11, name: "X-Salada", category: "Lanches", price: 18.00, desc: "Pão, bife, queijo, alface e tomate", img: "https://via.placeholder.com/150", stock: true },
            { id: 12, name: "X-Bacon", category: "Lanches", price: 22.00, desc: "Pão, bife, queijo e muito bacon", img: "https://via.placeholder.com/150", stock: true },
            // BEBIDAS
            { id: 20, name: "Coca-Cola 350ml", category: "Bebidas", price: 6.00, desc: "Lata gelada", img: "https://via.placeholder.com/150", stock: true },
            { id: 21, name: "Guaraná 350ml", category: "Bebidas", price: 5.00, desc: "Lata gelada", img: "https://via.placeholder.com/150", stock: true },
            { id: 22, name: "Água Mineral 500ml", category: "Bebidas", price: 3.50, desc: "Com ou sem gás", img: "https://via.placeholder.com/150", stock: true }
        ];

        let cart = [];

        // FUNÇÃO DE LOGIN (DESTRAVADA)
        function toggleAdminPass() {
            const phone = document.getElementById('login-phone').value.replace(/\D/g,'');
            const passBox = document.getElementById('admin-pass-box');
            if(phone === '18998165086') {
                passBox.classList.remove('hidden');
            } else {
                passBox.classList.add('hidden');
            }
        }

        function validaLogin() {
            const phoneInput = document.getElementById('login-phone').value;
            const phoneClean = phoneInput.replace(/\D/g,'');
            const pass = document.getElementById('login-pass').value;

            if(phoneClean === '18998165086' && pass === 'Concha@2005') {
                currentUser = { phone: phoneClean, role: 'admin' };
                document.getElementById('btn-admin-access').classList.remove('hidden');
            } else if (phoneClean.length >= 10) {
                currentUser = { phone: phoneClean, role: 'user' };
            } else {
                alert("Número de WhatsApp inválido!");
                return;
            }

            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('app-header').classList.remove('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('app-nav').classList.remove('hidden');
            
            initApp();
        }

        // MOTOR DO APLICATIVO
        function initApp() {
            renderCategories();
            renderProducts("Pastéis");
            syncFirebase();
        }

        function renderCategories() {
            const container = document.getElementById('category-bar');
            container.innerHTML = categories.map(cat => `
                <button onclick="renderProducts('${cat}')" class="category-btn bg-white px-8 py-3 rounded-[20px] shadow-sm font-black text-xs uppercase tracking-widest border-b-4 border-transparent hover:border-gold transition-all whitespace-nowrap">
                    ${cat}
                </button>
            `).join('');
        }

        function renderProducts(cat) {
            const container = document.getElementById('product-container');
            const filtered = products.filter(p => p.category === cat);
            
            container.innerHTML = filtered.map(p => `
                <div class="bg-white p-4 rounded-[30px] card-shadow flex gap-5 relative overflow-hidden group ${!p.stock ? 'opacity-60 grayscale' : ''}">
                    <div class="w-24 h-24 bg-gray-100 rounded-[25px] overflow-hidden flex-shrink-0 shadow-inner">
                        <img src="${p.img}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 flex flex-col justify-center">
                        <h4 class="font-black text-lg text-dark leading-tight">${p.name}</h4>
                        <p class="text-[9px] text-gray-400 font-bold uppercase mt-1 leading-tight">${p.desc}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="font-black text-xl text-red-600">R$ ${p.price.toFixed(2).replace('.',',')}</span>
                            <button onclick="addToCart(${p.id})" class="btn-red w-10 h-10 rounded-full flex items-center justify-center text-white shadow-lg active:scale-90 transition-all">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                    ${!p.stock ? '<div class="absolute inset-0 flex items-center justify-center bg-white/40"><span class="bg-black text-white px-4 py-1 rounded-full text-[10px] font-black uppercase">Esgotado</span></div>' : ''}
                </div>
            `).join('');
        }

        // ADMIN PANEL LOGIC
        function openAdmin() {
            document.getElementById('admin-modal').classList.remove('hidden');
            renderAdminList();
        }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

        function renderAdminList() {
            const container = document.getElementById('admin-items-list');
            container.innerHTML = products.map(p => `
                <div class="bg-white p-5 rounded-[25px] card-shadow flex justify-between items-center border-r-8 ${p.stock ? 'border-green-400' : 'border-red-400'}">
                    <div>
                        <p class="font-black text-dark">${p.name}</p>
                        <p class="text-[10px] font-bold text-gray-400">R$ ${p.price.toFixed(2)}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleProductStock(${p.id})" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500">
                            <i class="fas ${p.stock ? 'fa-check-circle text-green-500' : 'fa-times-circle text-red-500'}"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // FIREBASE SYNC (PERSISTÊNCIA REAL)
        function syncFirebase() {
            // Sincroniza Status da Loja
            db.collection('settings').doc('config').onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    const badge = document.getElementById('status-badge');
                    const text = document.getElementById('status-text');
                    const adminLabel = document.getElementById('admin-status-label');
                    
                    if(data.open) {
                        badge.className = "w-2 h-2 rounded-full bg-green-500 animate-pulse";
                        text.innerText = "ABERTO";
                        text.className = "text-[9px] font-black uppercase text-green-500 tracking-tighter";
                        adminLabel.innerText = "ABERTO";
                        adminLabel.className = "font-black text-2xl text-green-600";
                    } else {
                        badge.className = "w-2 h-2 rounded-full bg-red-600";
                        text.innerText = "FECHADO";
                        text.className = "text-[9px] font-black uppercase text-gray-400 tracking-tighter";
                        adminLabel.innerText = "FECHADO";
                        adminLabel.className = "font-black text-2xl text-red-600";
                    }
                }
            });

            // Sincroniza Produtos (Exemplo de persistência real)
            db.collection('products').onSnapshot(snapshot => {
                if(!snapshot.empty) {
                    const cloudProducts = [];
                    snapshot.forEach(doc => cloudProducts.push({ id: doc.id, ...doc.data() }));
                    // Aqui você mesclaria com os produtos locais ou substituiria
                    // produtos = cloudProducts;
                    // renderProducts("Pastéis");
                }
            });
        }

        function toggleStoreStatus() {
            const current = document.getElementById('admin-status-label').innerText === "ABERTO";
            db.collection('settings').doc('config').update({ open: !current });
        }

        function toggleProductStock(id) {
            const p = products.find(x => x.id === id);
            p.stock = !p.stock;
            renderAdminList();
            renderProducts(p.category);
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            const dot = document.getElementById('cart-dot');
            dot.innerText = cart.length;
            dot.classList.remove('hidden');
        }

    </script>
</body>
</html>
